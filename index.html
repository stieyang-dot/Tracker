<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Tracker">
  <meta name="theme-color" content="#f8fafc">
  <title>Accountability Tracker</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { background: #f8fafc; overflow-x: hidden; }
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
    @keyframes creatureFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    @keyframes creaturePulse { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }
    @keyframes particleRise { 0% { transform: translateY(0); opacity: 0.6; } 100% { transform: translateY(-120px); opacity: 0; } }
    @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes completeCelebrate { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
    input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const STORAGE_KEY = "accountability-partner-v3";
    const WATER_TARGET = 8;
    const OMAD_LIMIT = 1;

    // --- localStorage helpers ---
    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) return JSON.parse(raw);
      } catch {}
      return null;
    }
    function saveState(state) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
    }
    function clearState() {
      try { localStorage.removeItem(STORAGE_KEY); } catch {}
    }

    // --- date helpers (local timezone) ---
    const localDateStr = (d) =>
      `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    const todayStr = () => localDateStr(new Date());

    const defaultDay = (date) => ({ date, water: 0, mealTimes: [], workout: false, weight: null });

    const migrateDay = (day) => {
      if (day && day.meals !== undefined && !day.mealTimes) {
        return { ...day, mealTimes: Array(day.meals).fill(null) };
      }
      return day;
    };

    const defaultState = () => ({ days: {}, startWeight: null, longestStreak: 0, startDate: todayStr() });

    function mealCount(day) { return day?.mealTimes?.length ?? 0; }

    function isDayComplete(day) {
      if (!day) return false;
      return day.water >= WATER_TARGET && mealCount(day) <= OMAD_LIMIT && day.workout;
    }

    function getStreak(days) {
      let streak = 0;
      const today = new Date();
      for (let i = 0; i < 365; i++) {
        const d = new Date(today);
        d.setDate(d.getDate() - i);
        const key = localDateStr(d);
        const day = days[key] ? migrateDay(days[key]) : null;
        if (day && isDayComplete(day)) streak++;
        else if (i === 0) continue;
        else break;
      }
      return streak;
    }

    function getLastMealTimestamp(days) {
      let latest = null;
      for (const key of Object.keys(days)) {
        const day = migrateDay(days[key]);
        if (day.mealTimes) {
          for (const t of day.mealTimes) {
            if (t && (!latest || t > latest)) latest = t;
          }
        }
      }
      return latest;
    }

    function formatElapsed(ms) {
      if (!ms || ms < 0) return null;
      const totalMin = Math.floor(ms / 60000);
      const hours = Math.floor(totalMin / 60);
      const mins = totalMin % 60;
      if (hours >= 24) { const days = Math.floor(hours/24); return `${days}d ${hours%24}h`; }
      if (hours > 0) return `${hours}h ${mins}m`;
      return `${mins}m`;
    }

    function formatTime(ts) {
      if (!ts) return "—";
      return new Date(ts).toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit", hour12: true });
    }

    function getWeekDays() {
      const days = [], today = new Date(), dow = today.getDay();
      const mon = new Date(today); mon.setDate(today.getDate() - ((dow+6)%7));
      for (let i = 0; i < 7; i++) { const d = new Date(mon); d.setDate(mon.getDate()+i); days.push(localDateStr(d)); }
      return days;
    }

    function getWeightHistory(days, limit=14) {
      const entries = [], today = new Date();
      for (let i = limit-1; i >= 0; i--) {
        const d = new Date(today); d.setDate(d.getDate()-i);
        const key = localDateStr(d), day = days[key];
        if (day && day.weight != null) entries.push({ date: key, weight: day.weight, label: d.toLocaleDateString("en-US",{month:"short",day:"numeric"}) });
      }
      return entries;
    }

    function getCreatureStage(streak) {
      if (streak >= 30) return "dragon"; if (streak >= 14) return "wyvern";
      if (streak >= 7) return "drake"; if (streak >= 3) return "hatchling"; return "egg";
    }

    function getMotivation(streak, td) {
      const complete = isDayComplete(td), mc = mealCount(td);
      if (complete && streak >= 7) return "You're on FIRE. Literally. 🔥";
      if (complete) return "Today: crushed. Keep this energy.";
      const issues = [];
      if (td.water < WATER_TARGET) issues.push(`${WATER_TARGET-td.water} more glasses`);
      if (mc > OMAD_LIMIT) issues.push("over OMAD limit");
      if (!td.workout) issues.push("a workout");
      if (issues.length === 0) return "All targets hit! 💪";
      if (mc > OMAD_LIMIT) return "Over your meal limit. Tomorrow's a new day.";
      if (issues.length === 1) return `Almost there — just ${issues[0]} to go!`;
      if (new Date().getHours() < 10 && issues.length >= 2) return "Fresh day ahead. You got this.";
      return `Still need: ${issues.join(" & ")}`;
    }

    const DAY_LABELS = ["M","T","W","T","F","S","S"];

    const CreatureDisplay = ({ stage, streak, pulse }) => {
      const configs = {
        egg:{emoji:"🥚",bg:"linear-gradient(135deg,#374151,#4b5563)",glow:"none",label:"Egg",sublabel:"Build a 3-day streak to hatch"},
        hatchling:{emoji:"🐣",bg:"linear-gradient(135deg,#92400e,#b45309)",glow:"0 0 20px rgba(251,191,36,0.2)",label:"Hatchling",sublabel:"Your streak brought it to life!"},
        drake:{emoji:"🦎",bg:"linear-gradient(135deg,#065f46,#047857)",glow:"0 0 24px rgba(16,185,129,0.25)",label:"Drake",sublabel:"7 days strong"},
        wyvern:{emoji:"🐉",bg:"linear-gradient(135deg,#1e3a5f,#2563eb)",glow:"0 0 30px rgba(59,130,246,0.3)",label:"Wyvern",sublabel:"Two weeks of discipline"},
        dragon:{emoji:"🐲",bg:"linear-gradient(135deg,#7c2d12,#dc2626)",glow:"0 0 40px rgba(239,68,68,0.35)",label:"Dragon",sublabel:"Unstoppable. Legendary."},
      };
      const c = configs[stage];
      return (
        <div style={{background:c.bg,borderRadius:"20px",padding:"24px 16px",textAlign:"center",position:"relative",overflow:"hidden",boxShadow:c.glow,transition:"all 0.6s ease"}}>
          {(stage==="wyvern"||stage==="dragon") && <div style={{position:"absolute",inset:0,overflow:"hidden",pointerEvents:"none"}}>
            {[...Array(5)].map((_,i)=><div key={i} style={{position:"absolute",left:`${15+i*18}%`,bottom:"-10px",width:"4px",height:"4px",borderRadius:"50%",background:stage==="dragon"?"#fbbf24":"#93c5fd",opacity:0.6,animation:`particleRise ${2+i*0.5}s ease-in-out infinite ${i*0.4}s`}}/>)}
          </div>}
          <div style={{fontSize:"64px",marginBottom:"8px",animation:pulse?"creaturePulse 0.4s ease":(stage!=="egg"?"creatureFloat 3s ease-in-out infinite":"none"),filter:stage==="dragon"?"drop-shadow(0 0 12px rgba(251,191,36,0.5))":"none"}}>{c.emoji}</div>
          <div style={{color:"rgba(255,255,255,0.95)",fontFamily:"'Space Mono',monospace",fontSize:"13px",fontWeight:700,letterSpacing:"2px",textTransform:"uppercase"}}>{c.label}</div>
          <div style={{color:"rgba(255,255,255,0.5)",fontFamily:"'Space Mono',monospace",fontSize:"10px",marginTop:"4px"}}>{c.sublabel}</div>
          {streak>0 && <div style={{position:"absolute",top:"12px",right:"12px",background:"rgba(255,255,255,0.15)",backdropFilter:"blur(8px)",borderRadius:"10px",padding:"4px 10px",display:"flex",alignItems:"center",gap:"4px"}}>
            <span style={{fontSize:"12px"}}>🔥</span>
            <span style={{color:"white",fontFamily:"'Space Mono',monospace",fontSize:"12px",fontWeight:700}}>{streak}</span>
          </div>}
        </div>
      );
    };

    const WaterTracker = ({ count, onAdd, onRemove }) => (
      <div style={{background:"#f0f9ff",borderRadius:"16px",padding:"14px 16px",border:"1px solid #bae6fd"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}>
          <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
            <span style={{fontSize:"18px"}}>💧</span>
            <span style={{fontFamily:"'Space Mono',monospace",fontSize:"12px",fontWeight:700,color:"#0c4a6e"}}>WATER</span>
          </div>
          <span style={{fontFamily:"'Space Mono',monospace",fontSize:"11px",color:count>=WATER_TARGET?"#059669":"#64748b"}}>{count}/{WATER_TARGET} {count>=WATER_TARGET?"✓":""}</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
          <button onClick={onRemove} disabled={count<=0} style={{width:"32px",height:"32px",borderRadius:"10px",border:"none",background:count>0?"#e0f2fe":"#f1f5f9",color:count>0?"#0284c7":"#cbd5e1",fontSize:"16px",cursor:count>0?"pointer":"not-allowed",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>−</button>
          <div style={{flex:1,display:"flex",gap:"3px",justifyContent:"center"}}>
            {[...Array(WATER_TARGET)].map((_,i)=><div key={i} style={{width:"100%",maxWidth:"28px",height:"22px",borderRadius:"6px",background:i<count?"linear-gradient(180deg,#38bdf8,#0284c7)":"#e2e8f0",transition:"all 0.2s ease",transform:i<count?"scaleY(1)":"scaleY(0.85)"}}/>)}
          </div>
          <button onClick={onAdd} disabled={count>=WATER_TARGET} style={{width:"32px",height:"32px",borderRadius:"10px",border:"none",background:count<WATER_TARGET?"#0284c7":"#cbd5e1",color:"white",fontSize:"16px",cursor:count<WATER_TARGET?"pointer":"not-allowed",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>+</button>
        </div>
      </div>
    );

    const OMADTracker = ({ mealTimes, onLogMeal, onRemoveMeal, lastMealTimestamp, now }) => {
      const count = mealTimes.length, overLimit = count > OMAD_LIMIT;
      const elapsed = lastMealTimestamp ? now - lastMealTimestamp : null;
      const elapsedStr = formatElapsed(elapsed);
      return (
        <div style={{background:overLimit?"#fef2f2":"#fefce8",borderRadius:"16px",padding:"14px 16px",border:overLimit?"1px solid #fca5a5":"1px solid #fde68a",transition:"all 0.3s ease"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}>
            <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
              <span style={{fontSize:"18px"}}>🍽️</span>
              <span style={{fontFamily:"'Space Mono',monospace",fontSize:"12px",fontWeight:700,color:overLimit?"#991b1b":"#713f12"}}>OMAD</span>
            </div>
            <span style={{fontFamily:"'Space Mono',monospace",fontSize:"11px",color:overLimit?"#dc2626":"#059669"}}>
              {count===0?"Fasting ✓":count===1?"1 meal ✓":`${count} meals ✗`}
            </span>
          </div>
          <div style={{background:overLimit?"#fee2e2":"linear-gradient(135deg,rgba(251,191,36,0.08),rgba(245,158,11,0.04))",borderRadius:"12px",padding:"10px 14px",marginBottom:"10px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontFamily:"'Space Mono',monospace",fontSize:"8px",color:"#a16207",letterSpacing:"1px",marginBottom:"2px",textTransform:"uppercase"}}>{lastMealTimestamp?"Time since last meal":"No meals logged yet"}</div>
              <div style={{fontFamily:"'Space Mono',monospace",fontSize:"20px",fontWeight:700,color:overLimit?"#991b1b":"#713f12"}}>{elapsedStr||"—"}</div>
            </div>
            {lastMealTimestamp && <div style={{textAlign:"right"}}>
              <div style={{fontFamily:"'Space Mono',monospace",fontSize:"8px",color:"#a16207",letterSpacing:"1px",marginBottom:"2px"}}>LAST ATE</div>
              <div style={{fontFamily:"'Space Mono',monospace",fontSize:"11px",color:"#92400e",fontWeight:700}}>{formatTime(lastMealTimestamp)}</div>
            </div>}
          </div>
          {count>0 && <div style={{marginBottom:"10px",display:"flex",flexDirection:"column",gap:"4px"}}>
            {mealTimes.map((t,i)=><div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"6px 10px",borderRadius:"8px",background:i===0?"#fef9c3":"#fee2e2"}}>
              <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                <span style={{fontSize:"14px"}}>{i===0?"🍳":"⚠️"}</span>
                <span style={{fontFamily:"'Space Mono',monospace",fontSize:"10px",color:i===0?"#92400e":"#991b1b"}}>Meal {i+1}</span>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                <span style={{fontFamily:"'Space Mono',monospace",fontSize:"10px",color:"#a16207"}}>{t?formatTime(t):"—"}</span>
                <button onClick={()=>onRemoveMeal(i)} style={{width:"20px",height:"20px",borderRadius:"6px",border:"none",background:"rgba(0,0,0,0.06)",color:"#999",fontSize:"12px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1,padding:0}}>×</button>
              </div>
            </div>)}
          </div>}
          <button onClick={onLogMeal} style={{width:"100%",padding:"10px",borderRadius:"10px",border:"none",background:count>=OMAD_LIMIT?"linear-gradient(135deg,#fecaca,#fee2e2)":"linear-gradient(135deg,#fbbf24,#f59e0b)",color:count>=OMAD_LIMIT?"#991b1b":"white",fontFamily:"'Space Mono',monospace",fontSize:"10px",fontWeight:700,cursor:"pointer",letterSpacing:"1px"}}>
            {count===0?"LOG MEAL":count>=OMAD_LIMIT?"⚠️ LOG ANOTHER MEAL":"LOG MEAL"}
          </button>
          {overLimit && <div style={{marginTop:"8px",padding:"6px 10px",borderRadius:"8px",background:"#fee2e2",textAlign:"center",fontFamily:"'Space Mono',monospace",fontSize:"9px",color:"#991b1b"}}>Over limit — streak won't count today</div>}
        </div>
      );
    };

    const WorkoutToggle = ({ done, onToggle }) => (
      <button onClick={onToggle} style={{width:"100%",borderRadius:"16px",padding:"16px",border:done?"1px solid #86efac":"1px solid #e2e8f0",background:done?"linear-gradient(135deg,#ecfdf5,#d1fae5)":"#f8fafc",cursor:"pointer",display:"flex",alignItems:"center",gap:"12px",transition:"all 0.25s ease",boxShadow:done?"0 2px 12px rgba(16,185,129,0.15)":"none"}}>
        <div style={{width:"36px",height:"36px",borderRadius:"12px",background:done?"linear-gradient(135deg,#10b981,#059669)":"#e2e8f0",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"18px",transition:"all 0.25s ease"}}>{done?"✓":"🏋️"}</div>
        <div style={{textAlign:"left"}}>
          <div style={{fontFamily:"'Space Mono',monospace",fontSize:"12px",fontWeight:700,color:done?"#065f46":"#334155"}}>WORKOUT</div>
          <div style={{fontFamily:"'Space Mono',monospace",fontSize:"10px",color:done?"#059669":"#94a3b8",marginTop:"2px"}}>{done?"Done for today! 💪":"Tap when complete"}</div>
        </div>
      </button>
    );

    const WeightTracker = ({ todayWeight, onLog, weightHistory, startWeight }) => {
      const [input, setInput] = useState(todayWeight!=null?String(todayWeight):"");
      const [editing, setEditing] = useState(todayWeight==null);
      useEffect(()=>{ if(todayWeight!=null){setInput(String(todayWeight));setEditing(false);} },[todayWeight]);

      const latest = weightHistory.length>0?weightHistory[weightHistory.length-1].weight:null;
      const earliest = weightHistory.length>0?weightHistory[0].weight:null;
      const trend = weightHistory.length>=2?latest-earliest:null;
      const allTimeChange = latest&&startWeight?latest-startWeight:null;
      const minW = weightHistory.length>0?Math.min(...weightHistory.map(e=>e.weight)):0;
      const maxW = weightHistory.length>0?Math.max(...weightHistory.map(e=>e.weight)):0;
      const range = maxW-minW||1;

      const handleSave = ()=>{ const val=parseFloat(input); if(!isNaN(val)&&val>50&&val<500){onLog(val);setEditing(false);} };

      return (
        <div style={{background:"#faf5ff",borderRadius:"16px",padding:"14px 16px",border:"1px solid #e9d5ff"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}>
            <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
              <span style={{fontSize:"18px"}}>⚖️</span>
              <span style={{fontFamily:"'Space Mono',monospace",fontSize:"12px",fontWeight:700,color:"#581c87"}}>WEIGHT</span>
            </div>
            {allTimeChange!=null && <span style={{fontFamily:"'Space Mono',monospace",fontSize:"10px",fontWeight:700,color:allTimeChange<=0?"#059669":"#dc2626",background:allTimeChange<=0?"#ecfdf5":"#fef2f2",padding:"2px 8px",borderRadius:"6px"}}>{allTimeChange<=0?"↓":"↑"} {Math.abs(allTimeChange).toFixed(1)} lbs total</span>}
          </div>
          {editing||todayWeight==null ? (
            <div style={{display:"flex",gap:"8px",alignItems:"center"}}>
              <input type="number" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleSave()} placeholder="Today's weight" step="0.1" style={{flex:1,padding:"10px 12px",border:"2px solid #d8b4fe",borderRadius:"10px",fontFamily:"'Space Mono',monospace",fontSize:"13px",outline:"none",background:"#fefbff",color:"#581c87"}} />
              <span style={{fontFamily:"'Space Mono',monospace",fontSize:"11px",color:"#9333ea"}}>lbs</span>
              <button onClick={handleSave} style={{padding:"10px 14px",border:"none",borderRadius:"10px",background:input?"linear-gradient(135deg,#9333ea,#7c3aed)":"#d8cdd4",color:"white",fontFamily:"'Space Mono',monospace",fontSize:"10px",cursor:input?"pointer":"not-allowed",fontWeight:700}}>LOG</button>
            </div>
          ) : (
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div style={{display:"flex",alignItems:"baseline",gap:"6px"}}>
                <span style={{fontFamily:"'Space Mono',monospace",fontSize:"24px",fontWeight:700,color:"#581c87"}}>{todayWeight}</span>
                <span style={{fontFamily:"'Space Mono',monospace",fontSize:"11px",color:"#9333ea"}}>lbs</span>
                {trend!=null && <span style={{fontFamily:"'Space Mono',monospace",fontSize:"10px",color:trend<=0?"#059669":"#dc2626",marginLeft:"4px"}}>{trend<=0?"↓":"↑"}{Math.abs(trend).toFixed(1)} this period</span>}
              </div>
              <button onClick={()=>setEditing(true)} style={{background:"#ede9fe",border:"none",borderRadius:"8px",padding:"6px 10px",fontFamily:"'Space Mono',monospace",fontSize:"9px",color:"#7c3aed",cursor:"pointer"}}>EDIT</button>
            </div>
          )}
          {weightHistory.length>=2 && <div style={{marginTop:"12px"}}>
            <svg viewBox={`0 0 ${Math.max(weightHistory.length*24,48)} 40`} style={{width:"100%",height:"40px"}}>
              <defs><linearGradient id="sparkGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#9333ea" stopOpacity="0.2"/><stop offset="100%" stopColor="#9333ea" stopOpacity="0"/></linearGradient></defs>
              <path d={weightHistory.map((e,i)=>{const x=i*24+12,y=36-((e.weight-minW)/range)*30;return `${i===0?"M":"L"} ${x} ${y}`;}).join(" ")+` L ${(weightHistory.length-1)*24+12} 40 L 12 40 Z`} fill="url(#sparkGrad)"/>
              <polyline points={weightHistory.map((e,i)=>`${i*24+12},${36-((e.weight-minW)/range)*30}`).join(" ")} fill="none" stroke="#9333ea" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
              {weightHistory.map((e,i)=><circle key={i} cx={i*24+12} cy={36-((e.weight-minW)/range)*30} r="3" fill={i===weightHistory.length-1?"#7c3aed":"#c4b5fd"}/>)}
            </svg>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:"2px"}}>
              <span style={{fontFamily:"'Space Mono',monospace",fontSize:"8px",color:"#a78bfa"}}>{weightHistory[0].label}</span>
              <span style={{fontFamily:"'Space Mono',monospace",fontSize:"8px",color:"#a78bfa"}}>{weightHistory[weightHistory.length-1].label}</span>
            </div>
          </div>}
        </div>
      );
    };

    function App() {
      const [state, setState] = useState(null);
      const [pulse, setPulse] = useState(false);
      const [now, setNow] = useState(Date.now());

      useEffect(()=>{ const id=setInterval(()=>setNow(Date.now()),60000); return ()=>clearInterval(id); },[]);

      useEffect(()=>{
        const saved = loadState();
        if (saved) {
          for (const key of Object.keys(saved.days)) saved.days[key] = migrateDay(saved.days[key]);
          const today = todayStr();
          if (!saved.days[today]) saved.days[today] = defaultDay(today);
          setState(saved);
        } else {
          const fresh = defaultState();
          fresh.days[todayStr()] = defaultDay(todayStr());
          setState(fresh);
        }
      },[]);

      useEffect(()=>{ if(state) saveState(state); },[state]);

      const triggerPulse = useCallback(()=>{ setPulse(true); setTimeout(()=>setPulse(false),500); },[]);

      const updateToday = useCallback((fn)=>{
        triggerPulse();
        setState(prev=>{
          const today=todayStr();
          const day={...(prev.days[today]||defaultDay(today)),mealTimes:[...(prev.days[today]?.mealTimes||[])]};
          fn(day);
          const newDays={...prev.days,[today]:day};
          const streak=getStreak(newDays);
          return {...prev,days:newDays,longestStreak:Math.max(prev.longestStreak,streak)};
        });
      },[triggerPulse]);

      if (!state) return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#f8fafc"}}><div style={{fontFamily:"'Space Mono',monospace",fontSize:"12px",color:"#94a3b8"}}>Loading...</div></div>;

      const today=todayStr(), todayData=state.days[today]||defaultDay(today);
      const streak=getStreak(state.days), stage=getCreatureStage(streak);
      const weekDays=getWeekDays(), motivation=getMotivation(streak,todayData);
      const todayComplete=isDayComplete(todayData);
      const weightHistory=getWeightHistory(state.days,14);
      const lastMealTimestamp=getLastMealTimestamp(state.days);

      return (
        <div style={{minHeight:"100vh",background:"#f8fafc",fontFamily:"'Space Mono',monospace",padding:"16px",display:"flex",justifyContent:"center"}}>
          <div style={{width:"100%",maxWidth:"400px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px",padding:"0 4px"}}>
              <div>
                <div style={{fontSize:"16px",fontWeight:700,color:"#0f172a",letterSpacing:"1px"}}>ACCOUNTABILITY</div>
                <div style={{fontSize:"10px",color:"#94a3b8",marginTop:"2px"}}>{new Date().toLocaleDateString("en-US",{weekday:"long",month:"short",day:"numeric"})}</div>
              </div>
              {state.longestStreak>0 && <div style={{background:"#fef3c7",borderRadius:"10px",padding:"4px 10px",fontSize:"9px",color:"#92400e",fontWeight:700}}>BEST: {state.longestStreak}d</div>}
            </div>

            <div style={{marginBottom:"16px",animation:"fadeSlideIn 0.4s ease"}}><CreatureDisplay stage={stage} streak={streak} pulse={pulse}/></div>

            <div style={{background:todayComplete?"linear-gradient(135deg,#ecfdf5,#d1fae5)":"white",borderRadius:"14px",padding:"12px 16px",marginBottom:"16px",textAlign:"center",border:todayComplete?"1px solid #86efac":"1px solid #e2e8f0",animation:todayComplete?"completeCelebrate 0.5s ease":"fadeSlideIn 0.4s ease 0.1s both"}}>
              <span style={{fontSize:"11px",color:todayComplete?"#065f46":"#475569",fontWeight:todayComplete?700:400}}>{motivation}</span>
            </div>

            <div style={{display:"flex",flexDirection:"column",gap:"10px",marginBottom:"16px"}}>
              <div style={{animation:"fadeSlideIn 0.4s ease 0.15s both"}}>
                <WaterTracker count={todayData.water} onAdd={()=>updateToday(d=>{d.water=Math.min(WATER_TARGET,d.water+1);})} onRemove={()=>updateToday(d=>{d.water=Math.max(0,d.water-1);})}/>
              </div>
              <div style={{animation:"fadeSlideIn 0.4s ease 0.25s both"}}>
                <OMADTracker mealTimes={todayData.mealTimes||[]} onLogMeal={()=>updateToday(d=>{d.mealTimes.push(Date.now());})} onRemoveMeal={(idx)=>updateToday(d=>{d.mealTimes.splice(idx,1);})} lastMealTimestamp={lastMealTimestamp} now={now}/>
              </div>
              <div style={{animation:"fadeSlideIn 0.4s ease 0.35s both"}}>
                <WorkoutToggle done={todayData.workout} onToggle={()=>updateToday(d=>{d.workout=!d.workout;})}/>
              </div>
              <div style={{animation:"fadeSlideIn 0.4s ease 0.45s both"}}>
                <WeightTracker todayWeight={todayData.weight} onLog={(val)=>{updateToday(d=>{d.weight=val;}); if(!state.startWeight) setState(prev=>({...prev,startWeight:val}));}} weightHistory={weightHistory} startWeight={state.startWeight}/>
              </div>
            </div>

            <div style={{background:"white",borderRadius:"16px",padding:"14px 16px",border:"1px solid #e2e8f0",animation:"fadeSlideIn 0.4s ease 0.55s both"}}>
              <div style={{fontSize:"10px",fontWeight:700,color:"#64748b",marginBottom:"10px",letterSpacing:"1px"}}>THIS WEEK</div>
              <div style={{display:"flex",justifyContent:"space-between"}}>
                {weekDays.map((dateStr,i)=>{
                  const dayData=state.days[dateStr]?migrateDay(state.days[dateStr]):null;
                  const complete=dayData&&isDayComplete(dayData);
                  const broke=dayData&&mealCount(dayData)>OMAD_LIMIT;
                  const partial=dayData&&(dayData.water>0||dayData.workout)&&!broke;
                  const isToday=dateStr===today, isFuture=dateStr>today;
                  return (
                    <div key={dateStr} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"6px"}}>
                      <span style={{fontSize:"9px",fontWeight:isToday?700:400,color:isToday?"#0f172a":"#94a3b8"}}>{DAY_LABELS[i]}</span>
                      <div style={{width:"32px",height:"32px",borderRadius:"10px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"14px",
                        background:isFuture?"#f8fafc":complete?"linear-gradient(135deg,#10b981,#059669)":broke?"#fee2e2":partial?"#fef3c7":isToday?"#f1f5f9":"#f8fafc",
                        color:complete?"white":broke?"#dc2626":"#94a3b8",
                        border:isToday&&!complete?"2px solid #cbd5e1":"1px solid transparent",
                      }}>{isFuture?"":complete?"✓":broke?"✗":partial?"◐":isToday?"·":""}</div>
                    </div>
                  );
                })}
              </div>
            </div>

            <div style={{textAlign:"center",marginTop:"16px"}}>
              <button onClick={()=>{if(confirm("Reset all progress? This can't be undone.")){const fresh=defaultState();fresh.days[todayStr()]=defaultDay(todayStr());setState(fresh);clearState();}}} style={{background:"none",border:"none",fontSize:"9px",color:"#cbd5e1",cursor:"pointer",fontFamily:"'Space Mono',monospace"}}>RESET ALL DATA</button>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
